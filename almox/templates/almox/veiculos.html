{% extends 'almox/base.html' %}
{% block content %}
<div class="main-card">
    <h4 class="font-weight-bold mb-4"><i class="fas fa-truck text-primary"></i> Gerenciamento de Veículos</h4>
    <form method="post" class="mb-5">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-3 form-group">
                <label>Placa</label>
                <input type="text" name="placa" class="form-control" required placeholder="ABC-1234">
            </div>
            <div class="col-md-6 form-group">
                <label>Descrição (Marca/Modelo)</label>
                <input type="text" name="descricao" class="form-control" required placeholder="Ex: Trator John Deere 6125J">
            </div>
            <div class="col-md-3 form-group">
                <label>KM/Horas Atual</label>
                <input type="number" name="km_atual" class="form-control" required step="0.01">
            </div>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100">CADASTRAR VEÍCULO</button>
    </form>

    <h5 class="font-weight-bold mb-3">Frota Cadastrada</h5>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>Descrição</th>
                    <th>KM/Horas Atual</th>
                </tr>
            </thead>
            <tbody>
                {% for v in veiculos %}
                <tr>
                    <td><span class="badge badge-dark p-2">{{ v.placa }}</span></td>
                    <td>{{ v.descricao }}</td>
                    <td>{{ v.km_atual }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
