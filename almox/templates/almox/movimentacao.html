{% extends 'almox/base.html' %}

{% block content %}
<div class="main-card">
    <h4 class="font-weight-bold mb-4"><i class="fas fa-sign-out-alt text-danger"></i> Registrar Saída de Material</h4>
    <form method="post" id="form-movimentacao">
        {% csrf_token %}
        <div class="form-group">
            <label class="font-weight-bold">Responsável pela Retirada</label>
            <input type="text" name="responsavel" class="form-control form-control-lg" required placeholder="Nome do funcionário">
        </div>

        <div id="itens-container">
            <div class="row item-linha mb-3">
                <div class="col-md-8">
                    <label>Produto</label>
                    <select name="produto" class="form-control form-control-lg select-produto" required>
                        <option value="">Selecione o produto...</option>
                        {% for p in produtos %}
                            <option value="{{ p.id }}">{{ p.codigo }} - {{ p.nome }} (Estoque: {{ p.saldo }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label>Quantidade</label>
                    <input type="text" name="quantidade" class="form-control form-control-lg" required placeholder="0.00">
                </div>
            </div>
        </div>
        
        <button type="button" class="btn btn-outline-secondary mb-4" id="add-item">
            <i class="fas fa-plus"></i> Adicionar outro item
        </button>

        <button type="submit" class="btn btn-danger btn-custom w-100 py-3 font-weight-bold">CONFIRMAR SAÍDA</button>
    </form>
</div>

<script>
    document.getElementById('add-item').addEventListener('click', function() {
        const container = document.getElementById('itens-container');
        const novaLinha = container.querySelector('.item-linha').cloneNode(true);
        novaLinha.querySelectorAll('input, select').forEach(el => el.value = '');
        container.appendChild(novaLinha);
    });
</script>
{% endblock %}
