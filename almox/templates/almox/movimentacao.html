{% extends 'almox/base.html' %}

{% block content %}
<div class="content-header mb-4">
    <h3 class="font-weight-bold">Movimentação</h3>
</div>

<div class="content-card p-5">
    <h5 class="font-weight-bold mb-5"><i class="fas fa-sign-out-alt text-danger"></i> Registrar Saída de Material</h5>
    <form method="post" id="form-movimentacao">
        {% csrf_token %}
        <div class="form-group mb-4">
            <label class="font-weight-bold">Responsável pela Retirada</label>
            <input type="text" name="responsavel" class="form-control form-control-custom" required placeholder="Nome do funcionário">
        </div>

        <div id="itens-container">
            <div class="row item-linha mb-4 align-items-end">
                <div class="col-8 col-md-8">
                    <label class="font-weight-bold">Produto (Digite para buscar)</label>
                    <select name="produto" class="form-control select-produto-search" required>
                        <option value="">Buscar produto...</option>
                        {% for p in produtos %}
                            <option value="{{ p.id }}">{{ p.codigo }} - {{ p.nome }} (Estoque: {{ p.saldo }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-3 col-md-3">
                    <label class="font-weight-bold">Qtd</label>
                    <input type="text" name="quantidade" class="form-control form-control-custom" required placeholder="0.00">
                </div>
                <div class="col-1 col-md-1 p-0 mb-2">
                    <button type="button" class="btn btn-link text-danger btn-remove-item" style="display: none;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <button type="button" class="btn btn-outline-secondary mb-4 btn-sm" id="add-item">
            <i class="fas fa-plus"></i> Adicionar outro item
        </button>

        <button type="submit" class="btn btn-danger btn-custom w-100 py-3 shadow-sm btn-submit-loading">CONFIRMAR SAÍDA</button>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function initSelect2(element) {
        $(element).select2({
            placeholder: "Buscar produto...",
            allowClear: true,
            width: '100%'
        });
    }

    $(document).ready(function() {
        initSelect2('.select-produto-search');
    });

    document.getElementById('add-item').addEventListener('click', function() {
        const container = document.getElementById('itens-container');
        
        // Destroy select2 before cloning to avoid issues
        $('.select-produto-search').select2('destroy');
        
        const novaLinha = container.querySelector('.item-linha').cloneNode(true);
        novaLinha.querySelectorAll('input, select').forEach(el => el.value = '');
        novaLinha.querySelector('.btn-remove-item').style.display = 'block';
        container.appendChild(novaLinha);
        
        // Re-init all
        initSelect2('.select-produto-search');
    });

    document.getElementById('itens-container').addEventListener('click', function(e) {
        if(e.target.closest('.btn-remove-item')) {
            const linha = e.target.closest('.item-linha');
            $(linha).find('select').select2('destroy');
            linha.remove();
        }
    });

    document.getElementById('form-movimentacao').addEventListener('submit', function(e) {
        if (!navigator.onLine) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = {};
            formData.forEach((value, key) => {
                if (!data[key]) {
                    data[key] = value;
                } else {
                    if (!Array.isArray(data[key])) data[key] = [data[key]];
                    data[key].push(value);
                }
            });
            addToSyncQueue(window.location.href, data, 'Saída de Material');
            return;
        }
        const btn = this.querySelector('.btn-submit-loading');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> PROCESSANDO...';
    });
</script>
{% endblock %}
