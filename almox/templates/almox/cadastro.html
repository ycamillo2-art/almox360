{% extends 'almox/base.html' %}

{% block content %}
<div class="content-header mb-4">
    <h3 class="font-weight-bold">Cadastro de Produto</h3>
</div>

<div class="content-card p-5">
    <h5 class="font-weight-bold mb-5"><i class="fas fa-plus-circle text-success"></i> Novo Lançamento de Estoque</h5>
    <form method="post">
        {% csrf_token %}
        <div class="row mb-3">
            <div class="col-md-6 form-group">
                <label class="font-weight-bold">Nome do Produto</label>
                <input type="text" name="nome" class="form-control form-control-custom" required placeholder="Ex: Pá de Bico">
            </div>
            <div class="col-md-3 form-group">
                <label class="font-weight-bold">Categoria</label>
                <select name="categoria" class="form-control form-control-custom">
                    <option value="DIVERSOS">DIVERSOS</option>
                    <option value="FERRAMENTAS">FERRAMENTAS</option>
                    <option value="DEFENSIVOS">DEFENSIVOS</option>
                    <option value="ADUBO">ADUBO</option>
                </select>
            </div>
            <div class="col-md-3 form-group">
                <label class="font-weight-bold">Localização</label>
                <select name="local" class="form-control form-control-custom">
                    <option value="ALMOX 1">ALMOX 1</option>
                    <option value="ALMOX 2">ALMOX 2</option>
                    <option value="ALMOX 3">ALMOX 3</option>
                    <option value="ALMOX 4">ALMOX 4</option>
                    <option value="ALMOX 5">ALMOX 5</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="col-md-3 form-group">
                <label class="font-weight-bold">Saldo Inicial</label>
                <input type="text" name="saldo" class="form-control form-control-custom" required value="0">
            </div>
            <div class="col-md-3 form-group">
                <label class="font-weight-bold">Estoque Mínimo</label>
                <input type="text" name="minimo" class="form-control form-control-custom" required value="0">
            </div>
            <div class="col-md-6 form-group">
                <label class="font-weight-bold">Observação (Opcional)</label>
                <input type="text" name="observacao" class="form-control form-control-custom">
            </div>
        </div>
        <button type="submit" class="btn btn-success btn-custom w-100 mt-4 shadow-sm">SALVAR NO SISTEMA</button>
    </form>
</div>
{% endblock %}
