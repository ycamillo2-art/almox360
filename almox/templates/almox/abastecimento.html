{% extends 'almox/base.html' %}
{% block content %}
<div class="main-card">
    <h4 class="font-weight-bold mb-4"><i class="fas fa-gas-pump text-warning"></i> Registrar Abastecimento</h4>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Veículo</label>
            <select name="veiculo" class="form-control form-control-lg" required>
                <option value="">Selecione o veículo...</option>
                {% for v in veiculos %}
                    <option value="{{ v.id }}">{{ v.placa }} - {{ v.descricao }} (KM: {{ v.km_atual }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="row">
            <div class="col-md-4 form-group">
                <label>Combustível</label>
                <input type="text" name="combustivel" class="form-control" required placeholder="Ex: Diesel">
            </div>
            <div class="col-md-4 form-group">
                <label>Litros</label>
                <input type="number" name="litros" class="form-control" required step="0.01">
            </div>
            <div class="col-md-4 form-group">
                <label>KM/Horas no Abastecimento</label>
                <input type="number" name="km" class="form-control" required step="0.01">
            </div>
        </div>
        <div class="form-group">
            <label>Valor Total (R$)</label>
            <input type="number" name="valor" class="form-control" required step="0.01">
        </div>
        <button type="submit" class="btn btn-success-custom w-100 py-3">SALVAR ABASTECIMENTO</button>
    </form>
</div>
{% endblock %}
