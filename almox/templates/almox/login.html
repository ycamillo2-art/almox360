{% extends 'almox/base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="main-card text-center">
            <h2 class="brand-logo mb-4" style="font-size: 2.5rem;">ALMOX<span>360</span></h2>
            <p class="text-muted mb-4">Acesse o sistema de almoxarifado</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="form-group text-left">
                    <label class="font-weight-bold">Usuário</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-white border-right-0"><i class="fas fa-user text-muted"></i></span>
                        </div>
                        <input type="text" name="username" class="form-control border-left-0" required>
                    </div>
                </div>
                
                <div class="form-group text-left">
                    <label class="font-weight-bold">Senha</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-white border-right-0"><i class="fas fa-lock text-muted"></i></span>
                        </div>
                        <input type="password" name="password" id="password" class="form-control border-left-0" required>
                        <div class="input-group-append">
                            <button class="btn btn-outline-secondary border-left-0 bg-white" type="button" id="togglePassword">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-success-custom w-100 btn-custom mt-4">ENTRAR NO SISTEMA</button>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('togglePassword').addEventListener('click', function() {
        const password = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        eyeIcon.classList.toggle('fa-eye');
        eyeIcon.classList.toggle('fa-eye-slash');
    });
</script>
{% endblock %}
