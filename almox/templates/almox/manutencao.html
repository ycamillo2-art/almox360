{% extends 'almox/base.html' %}
{% block content %}
<div class="main-card">
    <h4 class="font-weight-bold mb-4"><i class="fas fa-wrench text-info"></i> Registrar Manutenção</h4>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Veículo</label>
            <select name="veiculo" class="form-control form-control-lg" required>
                <option value="">Selecione o veículo...</option>
                {% for v in veiculos %}
                    <option value="{{ v.id }}">{{ v.placa }} - {{ v.descricao }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Descrição da Manutenção</label>
            <textarea name="descricao" class="form-control" rows="3" required placeholder="O que foi feito?"></textarea>
        </div>
        <div class="row">
            <div class="col-md-6 form-group">
                <label>Custo (R$)</label>
                <input type="number" name="custo" class="form-control" required step="0.01">
            </div>
            <div class="col-md-6 form-group">
                <label>KM/Horas na Manutenção</label>
                <input type="number" name="km" class="form-control" required step="0.01">
            </div>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100 py-3">SALVAR MANUTENÇÃO</button>
    </form>
</div>
{% endblock %}
